<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Left globe -->
  <circle cx="36" cy="64" r="18" fill="none" stroke="#fff" stroke-width="3"/>
  <ellipse cx="36" cy="64" rx="8" ry="18" fill="none" stroke="#fff" stroke-width="2.2"/>
  <line x1="18" y1="64" x2="54" y2="64" stroke="#fff" stroke-width="2.2"/>
  <line x1="36" y1="46" x2="36" y2="82" stroke="#fff" stroke-width="0" />

  <!-- Right globe -->
  <circle cx="92" cy="64" r="18" fill="none" stroke="#fff" stroke-width="3"/>
  <ellipse cx="92" cy="64" rx="8" ry="18" fill="none" stroke="#fff" stroke-width="2.2"/>
  <line x1="74" y1="64" x2="110" y2="64" stroke="#fff" stroke-width="2.2"/>

  <!-- Arrow connecting them -->
  <line x1="56" y1="64" x2="72" y2="64" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="67,58 73,64 67,70" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
